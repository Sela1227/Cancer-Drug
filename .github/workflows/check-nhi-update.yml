name: 健保署資料更新檢查

# 每週一台灣時間 08:00 (UTC 00:00)
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Check NHI website
        id: check
        run: |
          python3 .github/scripts/check_nhi.py
        continue-on-error: true
      
      # 如果有下載到 PDF，上傳為 artifact (可保留 90 天)
      - name: Upload PDF as artifact
        if: steps.check.outputs.pdf_downloaded == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: chap9-pdf-${{ steps.check.outputs.new_date }}
          path: nhi_artifacts/*.pdf
          retention-days: 90
      
      # 建立 Issue 通知
      - name: Create or update issue if updated
        if: steps.check.outputs.updated == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const newDate = '${{ steps.check.outputs.new_date }}';
            const oldDate = '${{ steps.check.outputs.old_date }}';
            const pdfUrl = '${{ steps.check.outputs.pdf_url }}';
            const pdfDownloaded = '${{ steps.check.outputs.pdf_downloaded }}' === 'true';
            const sourceUrl = 'https://www.nhi.gov.tw/ch/cp-7593-ad2a9-3397-1.html';
            const runId = context.runId;
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            
            const title = `健保署第九節抗癌瘤藥物有新版（${newDate}）`;
            
            // PDF 下載連結（從 artifact 或健保署原始連結）
            let pdfSection = '';
            if (pdfDownloaded) {
              const artifactUrl = `${repoUrl}/actions/runs/${runId}`;
              pdfSection = `
            ## 📎 新版 PDF 已自動下載
            
            點此到 Actions 頁面下載 PDF artifact：
            👉 [前往下載](${artifactUrl})
            
            （點開後最下方 "Artifacts" 區會看到 \`chap9-pdf-${newDate}.zip\`）
            
            **健保署原始連結**：${pdfUrl}
            `;
            } else if (pdfUrl) {
              pdfSection = `
            ## 📎 新版 PDF
            
            自動下載失敗，請手動下載：
            👉 ${pdfUrl}
            `;
            } else {
              pdfSection = `
            ## 📎 新版 PDF
            
            請到健保署頁面下載：${sourceUrl}
            `;
            }
            
            const body = `
            ## 偵測到健保署資料更新
            
            - **目前系統使用**: ${oldDate}
            - **健保署最新版**: **${newDate}**
            - **來源頁面**: ${sourceUrl}
            ${pdfSection}
            ---
            
            ## 接手步驟
            
            1. 下載新版 PDF（連結在上方）
            2. 開新 Claude 對話：
               > 健保署有新版了，請重新整理資料
               
               並上傳 PDF
            3. Claude 會重做：
               - PDF 解析 → 145+ 個藥物項目
               - 自動逐癌切片
               - 9.69 等手工切片更新
               - 檢查 cancer_keywords 是否需新增
            4. 收到新 \`Cancer Drug V3.X.zip\` 後用 Git Pusher 推送
            5. **改 \`.github/scripts/check_nhi.py\` 中 \`CURRENT_DATA_DATE\`** 為 \`${newDate}\` ⚠️ 重要！不改的話下週又會通知
            6. 關閉本 issue
            
            ---
            
            *本 issue 由 GitHub Actions 自動建立。每週一 08:00 (台灣時間) 自動檢查。*
            `;
            
            // 找已存在的 open issue (避免重複開)
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['nhi-update']
            });
            
            const sameTitle = existing.data.find(i => i.title === title);
            if (sameTitle) {
              console.log(`已存在 issue #${sameTitle.number}，不重複建立`);
              return;
            }
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['nhi-update']
            });
            console.log(`已建立新 issue: ${title}`);
      
      - name: Report failure if check failed
        if: steps.check.outputs.check_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0,10);
            const title = `[警告] 健保署檢測失敗 (${today})`;
            const body = `
            ## 檢測失敗
            
            自動檢測腳本所有策略都失敗。可能原因:
            - 健保署網站結構改變
            - 健保署網站擋住所有 GitHub Actions IP
            - 第三方代理 (r.jina.ai 等) 也失效
            - 網路問題
            
            **請手動檢查**: https://www.nhi.gov.tw/ch/cp-7593-ad2a9-3397-1.html
            
            如連續多週失敗，可能要更新 \`.github/scripts/check_nhi.py\` 的解析邏輯。
            
            **錯誤訊息**: ${{ steps.check.outputs.error }}
            `;
            
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['check-failed']
            });
            
            const same = existing.data.find(i => i.title.includes(today));
            if (same) return;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['check-failed']
            });
